version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      gomod-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
