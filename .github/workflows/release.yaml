name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.2.3
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # Create the release tag and GitHub Release.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version
        id: version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          version="$RELEASE_VERSION"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semver with a leading v, for example v1.2.3" >&2
            exit 1
          fi
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag $version already exists" >&2
            exit 1
          fi
          package_version="${version#v}"
          spec_version="$(jq -r '.info.version' spec/vertesia-openapi.json)"
          if [[ "$spec_version" != "$package_version" ]]; then
            echo "OpenAPI spec info.version is $spec_version, want $package_version" >&2
            exit 1
          fi
          configured_version="$(awk -F': ' '/packageVersion:/ {print $2}' openapi-generator-config.yaml | tr -d '\"')"
          if [[ "$configured_version" != "$package_version" ]]; then
            echo "openapi-generator-config.yaml packageVersion is $configured_version, want OpenAPI spec info.version $package_version" >&2
            exit 1
          fi
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          tag_sha="$(gh api "repos/$REPOSITORY/git/tags" \
            -f tag="$TAG" \
            -f message="$TAG" \
            -f object="$TARGET_SHA" \
            -f type=commit \
            --jq .sha)"
          gh api "repos/$REPOSITORY/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$tag_sha"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          prerelease_flag=()
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "${prerelease_flag[@]}"
